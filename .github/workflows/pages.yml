name: Publish GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "releases/**"
      - "scripts/build_site.py"
      - "scripts/build_scroll_deck.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build static site into docs/
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          rm -rf docs
          python scripts/build_site.py --releases releases --out docs

      - name: Commit docs/ back to main
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "No docs changes to commit."
            exit 0
          fi
          git commit -m "chore(pages): rebuild docs/ for ${{ github.sha }} [skip ci]"
          git push origin HEAD:main
