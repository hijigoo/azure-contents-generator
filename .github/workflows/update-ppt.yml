name: Update Azure PPT

on:
  schedule:
    # 매주 월요일 00:00 UTC (= 09:00 KST)
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      source:
        description: "업데이트 대상 소스"
        required: false
        default: "samples"
        type: choice
        options:
          - samples
          - latest_release
          - custom
      target_file:
        description: "PPT 경로 — source=samples 면 기본 샘플, source=latest_release 면 무시, source=custom 이면 필수"
        required: false
        default: "samples/Microsoft Foundry를 활용한 Agentic AI.pptx"
      use_llm:
        description: "LLM 사용 여부 (false면 RSS 원문 bullet)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]
      engine:
        description: "LLM 엔진 선택"
        required: false
        default: "models"
        type: choice
        # models  = GitHub Models (GITHUB_TOKEN 만, 무료/엔터프라이즈 공통)
        # copilot = GitHub Copilot CLI 자율 에이전트 (Enterprise/Business/Pro+ + COPILOT_GITHUB_TOKEN 시크릿 필요)
        options: ["models", "copilot"]

jobs:
  update-ppt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install system dependencies (LibreOffice, poppler)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice poppler-utils

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: (Optional) Fetch Anthropic pptx skill for runtime reference
        # 본 레포의 skills/pptx-local 이 1차 컨텍스트. anthropic skill 은 라이선스상
        # 레포 커밋이 금지되므로 매 실행마다 sparse-checkout (Services 사용 중 임시 복사).
        # 실패해도 워크플로는 계속 진행 (로컬 skill 만으로 충분).
        run: |
          rm -rf .skills
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/anthropics/skills.git .skills || true
          if [ -d .skills ]; then
            git -C .skills sparse-checkout set skills/pptx || true
          fi

      - name: Fetch latest Azure updates
        run: |
          mkdir -p .cache
          python scripts/fetch_azure_updates.py --out .cache/updates.json

      - name: Summarize via GitHub Models (+ PR body)
        if: ${{ github.event.inputs.use_llm != 'false' && (github.event.inputs.engine || 'models') == 'models' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/llm_summarize.py \
            --updates .cache/updates.json \
            --skill   skills/pptx-local \
            --out     .cache/summary.md \
            --pr-body .cache/pr_body.md

      - name: Summarize via GitHub Copilot CLI (Cloud Agent, + PR body)
        if: ${{ github.event.inputs.use_llm != 'false' && github.event.inputs.engine == 'copilot' }}
        env:
          # Copilot CLI 는 기본 GITHUB_TOKEN 으로는 동작하지 않음.
          # 'Copilot Requests' 권한이 있는 PAT 를 COPILOT_GITHUB_TOKEN 시크릿에 등록해 두세요.
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          if [ -z "$COPILOT_GITHUB_TOKEN" ]; then
            echo "::error::COPILOT_GITHUB_TOKEN 시크릿이 비어 있습니다. Settings → Secrets → Actions 에서 등록하세요." >&2
            exit 1
          fi
          curl -fsSL https://gh.io/copilot-install | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.local/bin:$PATH"
          mkdir -p .cache
          PROMPT_FILE=".cache/copilot_prompt.txt"
          cat > "$PROMPT_FILE" <<'EOF'
          당신은 Azure 컨텐츠 큐레이터이자 PR 작성자입니다. 다음 파일들을 읽으세요:
            - .cache/updates.json                : Azure / Microsoft 최신 업데이트 RSS 결과
            - skills/pptx-local/SKILL.md         : 본 레포의 PPT 작성 규칙 (1차 컨텍스트)
            - skills/pptx-local/editing.md       : 본 레포의 편집 가이드
            - .skills/skills/pptx/SKILL.md       : (있으면 참고용) Anthropic 의 pptx skill
            - .skills/skills/pptx/editing.md     : (있으면 참고용)

          ① 한국어로 8개 이하의 핵심 업데이트를 마크다운 bullet 으로 요약하여
             .cache/summary.md 에 저장합니다. 각 bullet 한 줄 80자 이내,
             제품명/기능명은 굵게(`**...**`) 표기합니다.

          ② summary.md 를 바탕으로 GitHub Pull Request 본문을
             .cache/pr_body.md 에 저장합니다. 구성:
               - TL;DR (2~3문장)
               - '## 🆕 주요 업데이트' bullet 5개 이내
               - '## ✅ 리뷰 체크리스트' 3~5개 항목
               - '## 🔗 데이터 소스' 1줄
             이모지는 섹션 제목에만 1개씩.

          외부 호출/추가 다운로드는 금지합니다.
          작업 후 두 파일이 모두 비어있지 않은지 확인하세요.
          EOF
          copilot --prompt "$(cat $PROMPT_FILE)" --model gpt-4.1 --yes
          test -s .cache/summary.md || { echo "::error::Copilot CLI 가 summary.md 를 생성하지 못했습니다." >&2; exit 1; }
          test -s .cache/pr_body.md || { echo "::error::Copilot CLI 가 pr_body.md 를 생성하지 못했습니다." >&2; exit 1; }

      - name: Compute release directory (KST timestamp)
        id: release
        env:
          INPUT_SOURCE: ${{ github.event.inputs.source }}
          INPUT_TARGET: ${{ github.event.inputs.target_file }}
        run: |
          set -euo pipefail
          SOURCE="${INPUT_SOURCE:-}"
          # cron 또는 빈 입력 → releases/ 가 있으면 자동으로 가장 최신 릴리즈 기준,
          # 없으면 samples 로 폴백
          if [ -z "$SOURCE" ]; then
            if [ -n "$(ls -1dt releases/*/ 2>/dev/null | head -n1)" ]; then
              SOURCE=latest_release
              echo "[release] 입력 없음 → latest_release 자동 선택"
            else
              SOURCE=samples
              echo "[release] 입력 없음 + releases/ 비어있음 → samples 폴백"
            fi
          fi
          case "$SOURCE" in
            samples)
              TARGET="${INPUT_TARGET:-samples/Microsoft Foundry를 활용한 Agentic AI.pptx}"
              ;;
            latest_release)
              LATEST_DIR=$(ls -1dt releases/*/ 2>/dev/null | head -n1 || true)
              if [ -z "$LATEST_DIR" ]; then
                echo "::error::releases/ 폴더가 비어있습니다. source=samples 로 실행하세요." >&2
                exit 1
              fi
              TARGET=$(find "$LATEST_DIR" -maxdepth 1 -name '*.pptx' | sort | head -n1)
              if [ -z "$TARGET" ]; then
                echo "::error::$LATEST_DIR 안에 .pptx 가 없습니다." >&2
                exit 1
              fi
              echo "[release] latest_release 선택: $TARGET"
              ;;
            custom)
              if [ -z "${INPUT_TARGET:-}" ]; then
                echo "::error::source=custom 일 때는 target_file 입력이 필요합니다." >&2
                exit 1
              fi
              TARGET="$INPUT_TARGET"
              ;;
            *)
              echo "::error::알 수 없는 source: $SOURCE" >&2; exit 1 ;;
          esac
          if [ ! -f "$TARGET" ]; then
            echo "::error::대상 파일을 찾을 수 없습니다: $TARGET" >&2; exit 1
          fi
          STEM="$(basename "$TARGET" .pptx)"
          TS="$(TZ=Asia/Seoul date +'%Y%m%d-%H%M%S')"
          REL_DIR="releases/${TS}-${STEM}"
          mkdir -p "$REL_DIR"
          echo "target=$TARGET"   >> "$GITHUB_OUTPUT"
          echo "stem=$STEM"       >> "$GITHUB_OUTPUT"
          echo "ts=$TS"           >> "$GITHUB_OUTPUT"
          echo "dir=$REL_DIR"     >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE"   >> "$GITHUB_OUTPUT"

      - name: Inject latest updates into PPT (via skills/pptx-local)
        run: |
          SUMMARY_OPT=""
          if [ -f .cache/summary.md ]; then SUMMARY_OPT="--summary .cache/summary.md"; fi
          python scripts/update_ppt.py \
            --input   "${{ steps.release.outputs.target }}" \
            --updates .cache/updates.json \
            --skill   skills/pptx-local \
            --output  "${{ steps.release.outputs.dir }}/${{ steps.release.outputs.stem }}.pptx" \
            $SUMMARY_OPT

      - name: Render PPT previews (PDF + PNG) into release dir
        run: |
          python scripts/render_ppt_previews.py \
            --input "${{ steps.release.outputs.dir }}/${{ steps.release.outputs.stem }}.pptx" \
            --out   "${{ steps.release.outputs.dir }}"

      - name: Stash artifacts into release dir
        run: |
          if [ -f .cache/summary.md ]; then
            cp .cache/summary.md "${{ steps.release.outputs.dir }}/summary.md"
          fi
          if [ -f .cache/pr_body.md ]; then
            cp .cache/pr_body.md "${{ steps.release.outputs.dir }}/pr_body.md"
          fi
          if [ -f .cache/updates.json ]; then
            cp .cache/updates.json "${{ steps.release.outputs.dir }}/updates.json"
          fi

      - name: Update releases index & root README
        run: python scripts/update_releases_index.py

      - name: Prepare PR body (LLM-generated or fallback)
        id: prbody
        run: |
          BODY=".cache/pr_body.md"
          if [ ! -s "$BODY" ]; then
            cat > "$BODY" <<EOF
          ### 📊 Azure PPT 자동 업데이트

          Anthropic pptx skill + RSS 만으로 생성된 결정론적 업데이트입니다.
          LLM 요약이 비활성화되어 있어 PR 본문은 기본 템플릿으로 제공됩니다.
          EOF
          fi
          # 공통 메타 정보 (릴리즈 위치, 미리보기 링크) 추가
          cat >> "$BODY" <<EOF

          ---

          ### 📦 이번 릴리즈
          - 폴더: [\`${{ steps.release.outputs.dir }}/\`](./${{ steps.release.outputs.dir }})
          - 🖼 미리보기: [\`README.md\`](./${{ steps.release.outputs.dir }}/README.md)
          - 📄 PDF: [\`${{ steps.release.outputs.stem }}.pdf\`](./${{ steps.release.outputs.dir }}/${{ steps.release.outputs.stem }}.pdf)
          - 📊 PPTX: [\`${{ steps.release.outputs.stem }}.pptx\`](./${{ steps.release.outputs.dir }}/${{ steps.release.outputs.stem }}.pptx)

          ### ⚙️ 실행 정보
          - 트리거: \`${{ github.event_name }}\` · 실행 ID: \`${{ github.run_id }}\`
          - 엔진: \`${{ github.event.inputs.engine || 'models' }}\` (LLM: \`${{ github.event.inputs.use_llm || 'true' }}\`)
          - 원본 PPT 는 변경되지 않으며, 산출물은 모두 위 릴리즈 폴더에 누적됩니다.

          머지하면 루트 [\`README.md\`](./README.md) 의 **🆕 최신 변경 내용** 표가 갱신됩니다.
          EOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          # 우선 user PAT 가 있으면 사용 (조직 정책상 Actions 의 PR 생성이 막혀 있을 때).
          # 없으면 기본 GITHUB_TOKEN 사용 — 이 경우 레포 Settings → Actions → General →
          # "Allow GitHub Actions to create and approve pull requests" 가 켜져 있어야 합니다.
          token: ${{ secrets.PR_CREATE_PAT || secrets.GITHUB_TOKEN }}
          commit-message: "chore(ppt): release ${{ steps.release.outputs.ts }}"
          branch: auto/ppt-update-${{ github.run_id }}
          title: "📊 Azure PPT 자동 업데이트 — ${{ steps.release.outputs.ts }} KST"
          body-path: .cache/pr_body.md
          labels: |
            automated
            ppt-update
