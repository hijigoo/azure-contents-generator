name: Update Azure PPT

on:
  schedule:
    # 매주 월요일 00:00 UTC (= 09:00 KST)
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      target_file:
        description: "업데이트할 PPT 경로"
        required: false
        default: "samples/Microsoft Foundry를 활용한 Agentic AI.pptx"

jobs:
  update-ppt:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install system dependencies (LibreOffice, poppler)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice poppler-utils

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch Anthropic pptx skill (sparse checkout)
        run: |
          rm -rf .skills
          git clone --depth 1 --filter=blob:none --sparse \
            https://github.com/anthropics/skills.git .skills
          git -C .skills sparse-checkout set skills/pptx

      - name: Fetch latest Azure updates
        run: |
          mkdir -p .cache
          python scripts/fetch_azure_updates.py --out .cache/updates.json

      - name: Update PPT via Claude Code (with pptx skill)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            너는 Azure 기술 자료를 관리하는 시니어 테크니컬 라이터다.

            아래 파일을 최신 정보로 업데이트한다.

            - 대상 PPT 경로: `${{ github.event.inputs.target_file || 'samples/Microsoft Foundry를 활용한 Agentic AI.pptx' }}`
            - 참고 데이터: `.cache/updates.json` (Azure RSS 최신 항목들)
            - 사용할 skill: `.skills/skills/pptx` (Anthropic 공식 pptx skill — 슬라이드 읽기/쓰기에 반드시 활용)

            규칙:
            1. pptx skill을 로드해 슬라이드 구조를 파악한 뒤, 사실에 기반해서만 본문/노트를 갱신한다.
            2. 슬라이드 순서, 제목 체계, 마스터/테마, 폰트, 이미지는 보존한다.
            3. 갱신한 슬라이드의 노트(notes)에 출처 URL을 추가한다.
            4. 명백히 갱신이 불필요한 슬라이드는 그대로 둔다.
            5. 작업 후 결과를 동일한 경로에 저장한다.

      - name: Render PPT previews (PDF + PNG)
        run: |
          TARGET="${{ github.event.inputs.target_file || 'samples/Microsoft Foundry를 활용한 Agentic AI.pptx' }}"
          STEM="$(basename "$TARGET" .pptx)"
          python scripts/render_ppt_previews.py \
            --input "$TARGET" \
            --out   "previews/$STEM"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(ppt): Azure 최신 정보 반영"
          branch: auto/ppt-update-${{ github.run_id }}
          title: "📊 Azure PPT 자동 업데이트 (${{ github.run_id }})"
          body: |
            Anthropic pptx skill + Claude Code 로 자동 생성된 업데이트입니다.

            - 소스: Microsoft Learn / Azure Updates
            - 트리거: `${{ github.event_name }}`
            - 실행 ID: `${{ github.run_id }}`

            ### 📎 미리보기
            - PDF / 슬라이드별 PNG: [`previews/`](./previews) 폴더 참고
            - PR의 **Files changed** 탭에서 PDF는 인라인 렌더링되며,
              PNG는 `previews/<파일명>/README.md`에서 슬라이드 단위로 확인할 수 있습니다.

            머지 전에 슬라이드 내용을 검토해 주세요.
          labels: |
            automated
            ppt-update
