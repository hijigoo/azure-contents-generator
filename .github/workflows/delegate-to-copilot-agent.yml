name: Delegate PPT update to Copilot Coding Agent

# 정기적으로 "Azure PPT 를 최신 정보로 갱신해 PR 로 올려라" 라는 task issue 를 만들고
# 그 issue 를 GitHub Copilot Coding Agent 에 할당한다.
# 그러면 Copilot 이 GitHub 호스팅 환경에서 직접 브랜치/커밋/PR 을 만든다.
#
# ✅ 필요한 것:
#   - 레포(또는 조직) 에서 Copilot Coding Agent 가 활성화되어 있어야 함
#     (Settings → Copilot → Coding agent → Allow on this repository)
#   - 액세스 토큰:
#       · 기본은 ${{ secrets.GITHUB_TOKEN }} 으로 시도
#       · 조직 정책에 따라 기본 토큰으로 Copilot 할당이 막혀 있다면
#         COPILOT_AGENT_PAT (issues:write 권한 가진 user/Fine-grained PAT) 사용

on:
  schedule:
    # 매주 월요일 10:00 KST (UTC 01:00) — update-ppt.yml 보다 1시간 늦게
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      source:
        description: "업데이트 대상 소스"
        required: false
        default: "samples"
        type: choice
        options:
          - samples
          - latest_release
          - custom
      target:
        description: "PPT 경로 — source=samples 면 기본 샘플, source=latest_release 면 무시, source=custom 이면 필수"
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  open-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick target deck
        id: pick
        env:
          INPUT_SOURCE: ${{ github.event.inputs.source }}
          INPUT_TARGET: ${{ github.event.inputs.target }}
        run: |
          set -euo pipefail
          SOURCE="${INPUT_SOURCE:-}"
          if [ -z "$SOURCE" ]; then
            if [ -n "$(ls -1dt releases/*/ 2>/dev/null | head -n1)" ]; then
              SOURCE=latest_release
              echo "[pick] 입력 없음 → latest_release 자동 선택"
            else
              SOURCE=samples
              echo "[pick] 입력 없음 + releases/ 비어있음 → samples 폴백"
            fi
          fi
          case "$SOURCE" in
            samples)
              TARGET="${INPUT_TARGET:-samples/Microsoft Foundry를 활용한 Agentic AI.pptx}"
              ;;
            latest_release)
              LATEST_DIR=$(ls -1dt releases/*/ 2>/dev/null | head -n1 || true)
              if [ -z "$LATEST_DIR" ]; then
                echo "::error::releases/ 폴더가 비어있습니다. source=samples 로 실행하세요." >&2
                exit 1
              fi
              TARGET=$(find "$LATEST_DIR" -maxdepth 1 -name '*.pptx' | sort | head -n1)
              if [ -z "$TARGET" ]; then
                echo "::error::$LATEST_DIR 안에 .pptx 가 없습니다." >&2; exit 1
              fi
              ;;
            custom)
              if [ -z "${INPUT_TARGET:-}" ]; then
                echo "::error::source=custom 일 때는 target 입력이 필요합니다." >&2; exit 1
              fi
              TARGET="$INPUT_TARGET"
              ;;
            *) echo "::error::알 수 없는 source: $SOURCE" >&2; exit 1 ;;
          esac
          if [ ! -f "$TARGET" ]; then
            echo "::error::대상 파일을 찾을 수 없습니다: $TARGET" >&2; exit 1
          fi
          echo "target=$TARGET"            >> "$GITHUB_OUTPUT"
          echo "stem=$(basename "$TARGET" .pptx)" >> "$GITHUB_OUTPUT"
          echo "ts=$(TZ=Asia/Seoul date +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "today=$(TZ=Asia/Seoul date +'%Y-%m-%d')"   >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE"            >> "$GITHUB_OUTPUT"

      - name: Create task issue and assign to Copilot
        env:
          GH_TOKEN: ${{ secrets.COPILOT_AGENT_PAT || secrets.GITHUB_TOKEN }}
          OWNER:    ${{ github.repository_owner }}
          REPO:     ${{ github.event.repository.name }}
          TARGET:   ${{ steps.pick.outputs.target }}
          STEM:     ${{ steps.pick.outputs.stem }}
          TS:       ${{ steps.pick.outputs.ts }}
          TODAY:    ${{ steps.pick.outputs.today }}
        run: |
          set -euo pipefail

          TITLE="[Weekly] Azure 컨텐츠 PPT 자동 업데이트 ($TODAY)"
          BODY_FILE="$(mktemp)"
          cat > "$BODY_FILE" <<EOF
          @copilot Azure / Microsoft 공식 채널의 **최근 업데이트** 를 반영해서 PPT 자료를 새로 만들어 PR 로 올려주세요.

          ## 🎯 목표
          \`$TARGET\` 의 마지막 슬라이드 자리에 **'Latest Azure Updates'** 슬라이드를 새로 추가/교체하고,
          새로 만들어진 산출물을 \`releases/${TS}-${STEM}/\` 폴더에 모아 PR 을 생성합니다.

          ## 📐 반드시 따라야 할 작성 규칙
          작업을 시작하기 전에 아래 두 파일을 **먼저 읽고** 거기 적힌 트리거 규칙·편집 원칙·금지 사항을 그대로 따르세요.
          - \`skills/pptx-local/SKILL.md\`
          - \`skills/pptx-local/editing.md\`

          ## 🛠 권장 실행 절차
          데이터 수집·미리보기·README 갱신은 기존 스크립트를 그대로 쓰되,
          **PPT 편집(4단계) 만큼은 \`skills/pptx-local\` 의 규칙을 당신이 직접 읽고
          \`python-pptx\` 로 작성**해 주세요. (이게 이 task 의 핵심입니다.)

          \`\`\`bash
          # 1) 의존성
          pip install -r scripts/requirements.txt
          sudo apt-get update && sudo apt-get install -y --no-install-recommends libreoffice poppler-utils

          # 2) 최신 Azure 업데이트 수집
          mkdir -p .cache
          python scripts/fetch_azure_updates.py --out .cache/updates.json

          # 3) 릴리즈 폴더 준비
          REL="releases/${TS}-${STEM}"
          mkdir -p "\$REL"
          \`\`\`

          ### 4) PPT 편집 — **스크립트 호출 금지, 당신이 직접 작성**
          \`scripts/update_ppt.py\` 를 그대로 호출하지 말고, 다음 흐름으로 새 파이썬
          코드(예: \`scripts/agent_apply_updates.py\`)를 작성해 실행하세요.

          1. **컨텍스트 로드** — 아래 두 파일을 처음에 반드시 읽고 거기 적힌 트리거·작성 원칙·
             편집 규칙·금지 사항을 그대로 따릅니다.
             - \`skills/pptx-local/SKILL.md\`
             - \`skills/pptx-local/editing.md\`
          2. **입력 / 출력**
             - 입력: \`$TARGET\` (원본은 **절대 수정 금지**, 새 파일로 출력)
             - 출력: \`\$REL/${STEM}.pptx\`
             - 데이터: \`.cache/updates.json\`
          3. **멱등성** — 기존 PPT 의 끝부분에 같은 제목(\`Latest Azure Updates\`)
             슬라이드가 이미 있으면 **제거 후 새로 추가**합니다.
          4. **슬라이드 내용** — \`editing.md\` 가이드대로 *python-pptx* 로 직접 작성:
             - 제목 \`Latest Azure Updates\`
             - 본문: 한국어 bullet, 항목별로 굵은 제품/기능명 + 한 줄 설명
             - 슬라이드 노트(\`notes_slide\`)에 원문 링크/발행일 첨부
          5. **저장 후 zip dedupe** — \`python-pptx\` 가 가끔 같은 part 를 중복으로
             기록해 LibreOffice 가 \`source file could not be loaded\` 로 거부합니다.
             저장한 \`.pptx\` 의 zip entry 중 같은 이름은 마지막 것만 남기고 재압축하세요.
             (참고 구현: \`scripts/update_ppt.py\` 안의 \`dedupe_pptx_zip\` 함수)
          6. **결과 확인** — \`releases/.../\${STEM}.pptx\` 를 \`unzip -l\` 로 열어
             \`ppt/slides/slideN.xml\` 중복이 없는지 확인합니다.

          ### 5) 미리보기 / 인덱스 — 기존 스크립트 그대로
          \`\`\`bash
          python scripts/render_ppt_previews.py --input "\$REL/${STEM}.pptx" --out "\$REL"
          cp .cache/updates.json "\$REL/" 2>/dev/null || true
          python scripts/update_releases_index.py
          \`\`\`

          ## 📝 PR 본문에 꼭 포함할 내용
          - **TL;DR** (2~3문장)
          - **🆕 주요 업데이트** bullet 5개 이내, 제품/기능명은 굵게
          - **✅ 리뷰 체크리스트** 3~5개
          - **🔗 데이터 소스** 한 줄
          - 마지막 줄에 \`Closes #__ISSUE_NUMBER__\` (자동 닫힘)

          ## ⛔ 금지 사항
          - \`samples/*.pptx\` **수정 금지** (원본 보존)
          - \`scripts/update_ppt.py\` **를 그대로 호출 금지** — 위 4단계는 당신이 \`skills/pptx-local\` 가이드를 직접 읽고 새 코드를 작성해야 합니다
          - 외부 유료 API/추가 클라우드 호출 금지
          - 이미 있는 릴리즈 폴더 \`releases/*\` 의 파일 수정 금지 (새 폴더만 추가)
          EOF

          echo "::group::issue body"
          cat "$BODY_FILE"
          echo "::endgroup::"

          # 1) Issue 생성
          ISSUE_URL=$(gh issue create \
            --repo "$OWNER/$REPO" \
            --title "$TITLE" \
            --body-file "$BODY_FILE")
          echo "Created: $ISSUE_URL"
          ISSUE_NUM=${ISSUE_URL##*/}

          ISSUE_NODE_ID=$(gh api graphql \
            -f query='query($o:String!,$n:String!,$num:Int!){repository(owner:$o,name:$n){issue(number:$num){id}}}' \
            -F o="$OWNER" -F n="$REPO" -F num="$ISSUE_NUM" \
            -q .data.repository.issue.id)

          # 2) Copilot bot 의 actor id 조회 (할당 가능한 actor 목록에서)
          COPILOT_ID=$(gh api graphql \
            -f query='query($o:String!,$n:String!){repository(owner:$o,name:$n){suggestedActors(capabilities:[CAN_BE_ASSIGNED], first:100){nodes{__typename ... on Bot{id login} ... on User{id login}}}}}' \
            -F o="$OWNER" -F n="$REPO" \
            -q '.data.repository.suggestedActors.nodes[] | select(.login=="copilot-swe-agent" or .login=="Copilot" or .login=="copilot") | .id' \
            | head -n1)

          if [ -z "$COPILOT_ID" ]; then
            echo "::warning::Copilot Coding Agent 가 이 레포에서 활성화되어 있지 않거나 할당 대상에 노출되지 않습니다."
            echo "::warning::Settings → Copilot → Coding agent 에서 활성화하거나, COPILOT_AGENT_PAT 시크릿을 등록하세요."
            echo "Issue 는 생성되었습니다: $ISSUE_URL"
            exit 0
          fi

          # 3) Issue 를 Copilot 에 할당 → Coding Agent 가 자동으로 브랜치/PR 생성
          gh api graphql \
            -f query='mutation($a:ID!,$id:ID!){replaceActorsForAssignable(input:{assignableId:$a, actorIds:[$id]}){assignable{... on Issue{number url assignees(first:5){nodes{login}}}}}}' \
            -F a="$ISSUE_NODE_ID" -f id="$COPILOT_ID"

          echo "✅ Copilot Coding Agent 에 할당 완료: $ISSUE_URL"
