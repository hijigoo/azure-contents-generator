name: Delegate PPT update to Copilot Coding Agent

# 정기적으로 "Azure PPT 를 최신 정보로 갱신해 PR 로 올려라" 라는 task issue 를 만들고
# 그 issue 를 GitHub Copilot Coding Agent 에 할당한다.
# 그러면 Copilot 이 GitHub 호스팅 환경에서 직접 브랜치/커밋/PR 을 만든다.
#
# ✅ 필요한 것:
#   - 레포(또는 조직) 에서 Copilot Coding Agent 가 활성화되어 있어야 함
#     (Settings → Copilot → Coding agent → Allow on this repository)
#   - 액세스 토큰:
#       · 기본은 ${{ secrets.GITHUB_TOKEN }} 으로 시도
#       · 조직 정책에 따라 기본 토큰으로 Copilot 할당이 막혀 있다면
#         COPILOT_AGENT_PAT (issues:write 권한 가진 user/Fine-grained PAT) 사용

on:
  schedule:
    # 매주 월요일 10:00 KST (UTC 01:00) — update-ppt.yml 보다 1시간 늦게
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      source:
        description: "업데이트 대상 소스"
        required: false
        default: "samples"
        type: choice
        options:
          - samples
          - latest_release
          - custom
      target:
        description: "PPT 경로 — source=samples 면 기본 샘플, source=latest_release 면 무시, source=custom 이면 필수"
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  open-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick target deck
        id: pick
        env:
          INPUT_SOURCE: ${{ github.event.inputs.source }}
          INPUT_TARGET: ${{ github.event.inputs.target }}
        run: |
          set -euo pipefail
          SOURCE="${INPUT_SOURCE:-}"
          if [ -z "$SOURCE" ]; then
            if [ -n "$(ls -1dt releases/*/ 2>/dev/null | head -n1)" ]; then
              SOURCE=latest_release
              echo "[pick] 입력 없음 → latest_release 자동 선택"
            else
              SOURCE=samples
              echo "[pick] 입력 없음 + releases/ 비어있음 → samples 폴백"
            fi
          fi
          case "$SOURCE" in
            samples)
              TARGET="${INPUT_TARGET:-samples/Microsoft Foundry를 활용한 Agentic AI.pptx}"
              ;;
            latest_release)
              LATEST_DIR=$(ls -1dt releases/*/ 2>/dev/null | head -n1 || true)
              if [ -z "$LATEST_DIR" ]; then
                echo "::error::releases/ 폴더가 비어있습니다. source=samples 로 실행하세요." >&2
                exit 1
              fi
              TARGET=$(find "$LATEST_DIR" -maxdepth 1 -name '*.pptx' | sort | head -n1)
              if [ -z "$TARGET" ]; then
                echo "::error::$LATEST_DIR 안에 .pptx 가 없습니다." >&2; exit 1
              fi
              ;;
            custom)
              if [ -z "${INPUT_TARGET:-}" ]; then
                echo "::error::source=custom 일 때는 target 입력이 필요합니다." >&2; exit 1
              fi
              TARGET="$INPUT_TARGET"
              ;;
            *) echo "::error::알 수 없는 source: $SOURCE" >&2; exit 1 ;;
          esac
          if [ ! -f "$TARGET" ]; then
            echo "::error::대상 파일을 찾을 수 없습니다: $TARGET" >&2; exit 1
          fi
          echo "target=$TARGET"            >> "$GITHUB_OUTPUT"
          echo "stem=$(basename "$TARGET" .pptx)" >> "$GITHUB_OUTPUT"
          echo "ts=$(TZ=Asia/Seoul date +'%Y%m%d-%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "today=$(TZ=Asia/Seoul date +'%Y-%m-%d')"   >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE"            >> "$GITHUB_OUTPUT"

      - name: Create task issue and assign to Copilot
        env:
          GH_TOKEN: ${{ secrets.COPILOT_AGENT_PAT || secrets.GITHUB_TOKEN }}
          OWNER:    ${{ github.repository_owner }}
          REPO:     ${{ github.event.repository.name }}
          TARGET:   ${{ steps.pick.outputs.target }}
          STEM:     ${{ steps.pick.outputs.stem }}
          TS:       ${{ steps.pick.outputs.ts }}
          TODAY:    ${{ steps.pick.outputs.today }}
        run: |
          set -euo pipefail

          TITLE="[Weekly] Azure 컨텐츠 PPT 자동 업데이트 ($TODAY)"
          BODY_FILE="$(mktemp)"
          cat > "$BODY_FILE" <<EOF
          @copilot Azure / Microsoft 공식 채널의 **최근 업데이트** 를 반영해서 PPT 자료를 새로 만들어 PR 로 올려주세요.

          ## 🎯 목표 — **기존 슬라이드를 in-place 로 갱신**
          \`$TARGET\` 의 **기존 슬라이드 본문 자체를** 최신 사실에 맞춰 자연스럽게 고치는 것이
          목표입니다. **끝에 'Latest Azure Updates' 같은 별도 섹션을 박는 방식은 금지**합니다.
          발표자가 슬라이드 흐름을 바꾸지 않고도 최신 정보를 그대로 발표할 수 있어야 합니다.

          구체적으로:
          - 기존 슬라이드에서 **사실 관계가 낡은 부분**(버전·가격·GA 여부·기능 목록 등)을
            최신 \`.cache/updates.json\` 에 맞춰 **그 슬라이드의 텍스트를 직접 수정**합니다.
          - 기존 슬라이드 중 **어디에도 자연스럽게 들어가지 않는 신규 항목**만, 가장 관련성
            높은 슬라이드 **바로 뒤**에 **같은 레이아웃** 으로 새 슬라이드를 1장 끼워넣습니다.
          - 모든 변경 슬라이드의 노트(\`notes_slide\`)에 변경 사유·원문 링크·실행일을 적고
            노트 첫 줄에 \`[auto-update:${TODAY}]\` 마커를 남깁니다 (멱등성용).
          - 산출물은 \`releases/${TS}-${STEM}/\` 폴더에 모아 PR 을 생성합니다.

          ## 📐 반드시 따라야 할 작성 규칙
          작업을 시작하기 전에 아래 두 파일을 **먼저 읽고** 거기 적힌 트리거 규칙·편집 원칙·금지 사항을 그대로 따르세요.
          - \`skills/pptx/SKILL.md\` ← **이게 1순위, 최종 기준**
          - \`skills/pptx/editing.md\`

          > 📎 *(보조 참고용)* Anthropic 공식 PPTX skill —
          > <https://github.com/anthropics/skills/tree/main/skills/pptx>
          > 일반적인 \`python-pptx\` 모범 사례 확인용으로만 *읽기* 만 허용합니다.
          > **이 레포로 코드/문서를 복사하거나 derivative 파일을 만드는 것은 라이선스 위반**
          > 이므로 절대 금지입니다 (LICENSE.txt 참조).
          > 충돌 시 위의 \`skills/pptx/SKILL.md\` 가 항상 우선합니다.

          ## 🛠 권장 실행 절차
          데이터 수집·미리보기·README 갱신은 기존 스크립트를 그대로 쓰되,
          **PPT 편집(4단계) 만큼은 \`skills/pptx\` 의 규칙을 당신이 직접 읽고
          \`python-pptx\` 로 작성**해 주세요. (이게 이 task 의 핵심입니다.)

          \`\`\`bash
          # 1) 의존성 — 한글 PPT 렌더링용 CJK 폰트 반드시 포함
          pip install -r scripts/requirements.txt
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            libreoffice poppler-utils \
            fonts-noto-cjk fonts-noto-cjk-extra fonts-nanum fonts-nanum-coding fonts-nanum-extra \
            fonts-noto-color-emoji
          fc-cache -f -v >/dev/null 2>&1 || true

          # 2) 최신 Azure 업데이트 수집
          mkdir -p .cache
          python scripts/fetch_azure_updates.py --out .cache/updates.json

          # 3) 릴리즈 폴더 준비
          REL="releases/${TS}-${STEM}"
          mkdir -p "\$REL"
          \`\`\`

          ### 4) PPT 편집 — **스크립트 호출 금지, 당신이 직접 작성**
          \`scripts/update_ppt.py\` 를 그대로 호출하지 말고, 다음 흐름으로 새 파이썬
          코드(예: \`scripts/agent_apply_updates.py\`)를 작성해 실행하세요.

          1. **컨텍스트 로드** — \`skills/pptx/SKILL.md\` + \`editing.md\` 를 먼저 읽고 거기 적힌 원칙을 그대로 따릅니다.
          2. **입력 / 출력**
             - 입력: \`$TARGET\` (원본은 **절대 수정 금지**, 새 파일로 출력)
             - 출력: \`\$REL/${STEM}.pptx\`
             - 데이터: \`.cache/updates.json\`
          3. **기존 슬라이드 스캔** — \`prs.slides\` 를 순회하며 각 슬라이드의 모든 텍스트
             (제목·본문·표 셀·도형 텍스트·노트)를 모아 *"이 슬라이드가 무슨 주제인가"* 를
             판단하세요. (간단한 키워드/주제 요약으로 충분)
          4. **항목 매칭 → 갱신 결정** — \`.cache/updates.json\` 의 항목들을 다음 규칙으로
             처리합니다. (각 항목은 정확히 한 가지로 분류)
             a) **REPLACE** — 기존 슬라이드의 사실 관계와 직접 충돌하는 경우
                (예: "GPT-4 지원" → 최신 항목이 "GPT-5 GA")
                · 해당 슬라이드의 **그 부분 텍스트만** 교체 (전체 슬라이드를 새로 만들지 말 것)
                · run 단위로 수정해서 폰트·색·굵기 유지
             b) **AUGMENT** — 기존 슬라이드의 주제와 같지만 새 정보가 추가된 경우
                (예: "Azure OpenAI 기능 목록" 슬라이드에 새 기능 1줄 bullet 추가)
                · 기존 bullet 들과 같은 들여쓰기·스타일로 추가
             c) **INSERT** — 어떤 기존 슬라이드와도 명확히 연결되지 않는 신규 항목
                · 가장 관련성 높은 슬라이드 **바로 뒤**에 1장 삽입
                · 그 슬라이드와 **같은 layout** 사용 (\`prs.slide_layouts\` 에서 매칭)
                · 제목 / 메타(📅 발행일 🏷 출처) / 본문 2~3줄 / 🔗 링크
                · 무관한 일반 뉴스만 잔뜩 있으면 INSERT 는 **최대 2장** 까지만
             d) **SKIP** — 이미 슬라이드에 반영되어 있거나 노이즈성 항목
          5. **레이아웃 재사용 규칙** — 어떤 경우에도 새 레이아웃을 만들지 말고,
             \`prs.slide_layouts\` 에서 이름 키워드 매칭으로 골라 쓰세요.
             - 본문: 이름에 \`Title and Content\` / \`Content\` 포함
             - 표지/구분: \`Section\` / \`Header\` / \`Divider\` / \`Title\` 포함
             - 못 찾으면 *삽입 위치의 직전 슬라이드와 동일한 layout* 사용 → 마지막 폴백 \`prs.slide_layouts[1]\`
             이렇게 해야 원본 PPT 의 컬러·폰트·로고·푸터가 자동으로 적용됩니다.
          6. **표지 슬라이드 갱신** — 원본의 첫 슬라이드(표지)에 'Updated YYYY-MM-DD' 가
             들어갈 자리(부제목/푸터 placeholder)가 있으면 오늘 날짜로 갱신. 통째로 덮어쓰지 말 것.
          7. **변경 노트 + 멱등성 마커**
             - REPLACE/AUGMENT/INSERT 로 손댄 모든 슬라이드의 노트 첫 줄에
               \`[auto-update:${TODAY}]\` 마커를 적습니다.
             - 노트 둘째 줄부터: \`- <원문 제목> | <발행일> | <URL>\` 형식으로 출처를 남깁니다.
             - **다음 실행 시 멱등성**: 이전 실행이 남긴 \`[auto-update:*]\` 마커가 있는
               *INSERT 슬라이드만* 식별해서 제거하세요. (REPLACE/AUGMENT 로 고친 본문은
               이미 새 사실에 맞춰져 있으므로 되돌리지 말고 그대로 둡니다.) 그러고 나서
               이번 회차의 매칭/삽입을 새로 수행합니다.
          8. **저장 후 zip dedupe** — \`python-pptx\` 가 같은 part 를 중복 기록해 LibreOffice 가
             \`source file could not be loaded\` 로 거부하는 사고가 있습니다. 저장한 \`.pptx\` 의
             zip entry 중 같은 이름은 마지막 것만 남기고 재압축하세요.
             (참고: \`scripts/update_ppt.py\` 의 \`dedupe_pptx_zip\` 함수)
          9. **결과 검증 — 아래 중 하나라도 실패면 다시 작성**
             - "Latest Azure Updates" 같은 별도 섹션 슬라이드가 **추가되지 않았는가?** (있으면 실패)
             - REPLACE/AUGMENT 가 **0건**이면 의심 — 기존 본문을 진짜로 읽고 매칭했는가?
             - 표지의 디자인(폰트·색)이 원본과 동일한가?
             - \`unzip -l\` 에 \`ppt/slides/slideN.xml\` 중복이 없는가?
             - 변경 슬라이드 노트에 \`[auto-update:${TODAY}]\` 마커가 모두 들어갔는가?

          ### 5) 미리보기 / 인덱스 — 기존 스크립트 그대로
          \`\`\`bash
          python scripts/render_ppt_previews.py --input "\$REL/${STEM}.pptx" --out "\$REL"
          cp .cache/updates.json "\$REL/" 2>/dev/null || true
          python scripts/update_releases_index.py
          \`\`\`

          ## 📝 PR 본문에 꼭 포함할 내용
          - **TL;DR** (2~3문장)
          - **🛠 변경 요약 표** — 컬럼: \`슬라이드 번호\` / \`동작(REPLACE·AUGMENT·INSERT)\` / \`핵심 변경\` / \`원문 링크\`
          - **✅ 리뷰 체크리스트** 3~5개 (특히 "어색한 문장이 없는가" 항목 포함)
          - **🔗 데이터 소스** 한 줄
          - 마지막 줄에 \`Closes #__ISSUE_NUMBER__\` (자동 닫힘)

          ## ⛔ 금지 사항
          - \`samples/*.pptx\` **수정 금지** (원본 보존, 새 파일로만 출력)
          - **'Latest Azure Updates' 같은 별도 요약 섹션을 끝에 박는 패턴 금지**
            (이번 task 의 핵심은 *기존 슬라이드를 직접 고치는 것*입니다)
          - 기존 슬라이드를 **통째로 새 슬라이드로 교체 금지** — run 단위로 텍스트만 수정
          - \`scripts/update_ppt.py\` **를 그대로 호출 금지** — 위 단계는 당신이 \`skills/pptx\` 가이드를 읽고 새 코드를 작성해야 합니다 (단, \`dedupe_pptx_zip\` / \`remove_auto_slides\` 같은 헬퍼 함수는 import 해서 재사용해도 됩니다)
          - **\`anthropics/skills\` 의 파일을 본 레포로 복사·이식·재배포 금지** — 라이선스 위반입니다. 외부 링크는 *읽기 참고* 까지만 허용
          - 외부 유료 API/추가 클라우드 호출 금지
          - 이미 있는 릴리즈 폴더 \`releases/*\` 의 파일 수정 금지 (새 폴더만 추가)
          EOF

          echo "::group::issue body"
          cat "$BODY_FILE"
          echo "::endgroup::"

          # 1) Issue 생성
          ISSUE_URL=$(gh issue create \
            --repo "$OWNER/$REPO" \
            --title "$TITLE" \
            --body-file "$BODY_FILE")
          echo "Created: $ISSUE_URL"
          ISSUE_NUM=${ISSUE_URL##*/}

          ISSUE_NODE_ID=$(gh api graphql \
            -f query='query($o:String!,$n:String!,$num:Int!){repository(owner:$o,name:$n){issue(number:$num){id}}}' \
            -F o="$OWNER" -F n="$REPO" -F num="$ISSUE_NUM" \
            -q .data.repository.issue.id)

          # 2) Copilot bot 의 actor id 조회 (할당 가능한 actor 목록에서)
          COPILOT_ID=$(gh api graphql \
            -f query='query($o:String!,$n:String!){repository(owner:$o,name:$n){suggestedActors(capabilities:[CAN_BE_ASSIGNED], first:100){nodes{__typename ... on Bot{id login} ... on User{id login}}}}}' \
            -F o="$OWNER" -F n="$REPO" \
            -q '.data.repository.suggestedActors.nodes[] | select(.login=="copilot-swe-agent" or .login=="Copilot" or .login=="copilot") | .id' \
            | head -n1)

          if [ -z "$COPILOT_ID" ]; then
            echo "::warning::Copilot Coding Agent 가 이 레포에서 활성화되어 있지 않거나 할당 대상에 노출되지 않습니다."
            echo "::warning::Settings → Copilot → Coding agent 에서 활성화하거나, COPILOT_AGENT_PAT 시크릿을 등록하세요."
            echo "Issue 는 생성되었습니다: $ISSUE_URL"
            exit 0
          fi

          # 3) Issue 를 Copilot 에 할당 → Coding Agent 가 자동으로 브랜치/PR 생성
          gh api graphql \
            -f query='mutation($a:ID!,$id:ID!){replaceActorsForAssignable(input:{assignableId:$a, actorIds:[$id]}){assignable{... on Issue{number url assignees(first:5){nodes{login}}}}}}' \
            -F a="$ISSUE_NODE_ID" -f id="$COPILOT_ID"

          echo "✅ Copilot Coding Agent 에 할당 완료: $ISSUE_URL"
